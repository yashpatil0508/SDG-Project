{% extends 'base.html' %}

{% block content %}
<div class="header-section" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="font-size: 2rem; margin-bottom: 0.5rem;"><i class="fa-solid fa-users-gear" style="color: var(--primary-color);"></i> Manage Users</h1>
        <p style="color: var(--text-muted);">View all registered accounts and manage their access roles.</p>
    </div>
</div>

<div class="glass-panel table-container">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Current Role</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>
                    <div style="font-weight: 600; color: white;">{{ user.name }}</div>
                </td>
                <td>{{ user.email }}</td>
                <td>
                    <span class="badge {{ user.role }}">{{ user.role|title }}</span>
                </td>
                <td>
                    <form action="{{ url_for('update_user_role', user_id=user.id) }}" method="POST" style="display: flex; gap: 0.5rem; align-items: center;">
                        <select name="role" style="padding: 0.4rem 0.5rem; font-size: 0.85rem; width: 140px; background: rgba(15, 23, 42, 0.9);">
                            <option value="employee" {% if user.role == 'employee' %}selected{% endif %}>Employee</option>
                            <option value="manager" {% if user.role == 'manager' %}selected{% endif %}>Manager</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                        </select>
                        <button type="submit" class="btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">
                            Update
                        </button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 3rem;">
                    No registered users found.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
