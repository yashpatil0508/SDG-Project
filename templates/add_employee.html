{% extends 'base.html' %}

{% block content %}
<div class="animate-fade-in">
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('employees') }}" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: color 0.2s;">
            <i class="fa-solid fa-arrow-left"></i> Back to Directory
        </a>
    </div>

    <div class="glass-panel" style="padding: 2.5rem; max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 2rem; font-size: 1.75rem;"><i class="fa-solid fa-user-plus" style="margin-right: 0.5rem; color: var(--primary-color);"></i> Add New Employee</h2>
        
        <form method="POST" action="{{ url_for('add_employee') }}">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="first_name">First Name *</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="last_name">Last Name *</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="employee_id">Employee ID *</label>
                    <input type="text" id="employee_id" name="employee_id" placeholder="e.g., EMP2000" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="email">Work Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="department_id">Department *</label>
                    <select id="department_id" name="department_id" required>
                        <option value="">Select a Department...</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="role">Role *</label>
                    <select id="role" name="role" required>
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="status">Status *</label>
                    <select id="status" name="status" required>
                        <option value="Active">Active</option>
                        <option value="On Leave">On Leave</option>
                        <option value="Terminated">Terminated</option>
                    </select>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border);">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="join_date">Join Date *</label>
                    <input type="date" id="join_date" name="join_date" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="salary">Annual Salary (USD)</label>
                    <input type="number" id="salary" name="salary" placeholder="e.g., 75000">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <a href="{{ url_for('employees') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn"><i class="fa-solid fa-save"></i> Save Employee</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
