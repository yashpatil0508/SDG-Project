{% extends 'base.html' %}

{% block content %}
<div class="animate-fade-in">
    <div style="margin-bottom: 2rem;">
        <a href="{{ url_for('employee_detail', id=employee.id) }}" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: color 0.2s;">
            <i class="fa-solid fa-arrow-left"></i> Back to Profile
        </a>
    </div>

    <div class="glass-panel" style="padding: 2.5rem; max-width: 600px; margin: 0 auto;">
        <h2 style="margin-bottom: 0.5rem; font-size: 1.75rem;"><i class="fa-solid fa-receipt" style="margin-right: 0.5rem; color: var(--primary-color);"></i> Record Payment</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Add a new payment record for <strong>{{ employee.first_name }} {{ employee.last_name }}</strong> ({{ employee.employee_id }})</p>
        
        <form method="POST" action="{{ url_for('add_payment', id=employee.id) }}">
            <div class="form-group">
                <label for="amount">Payment Amount (USD) *</label>
                <input type="number" step="0.01" id="amount" name="amount" value="{{ (employee.salary / 12)|round(2) if employee.salary else '' }}" placeholder="e.g., 5000.00" required>
            </div>

            <div class="form-group">
                <label for="payment_date">Payment Date *</label>
                <input type="date" id="payment_date" name="payment_date" value="{{ today_date }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description *</label>
                <input type="text" id="description" name="description" value="Monthly Salary for {{ today_month_year }}" placeholder="e.g., Monthly Salary for March 2026" required>
            </div>

            <div class="form-group">
                <label for="status">Payment Status *</label>
                <select id="status" name="status" required>
                    <option value="Paid" selected>Paid</option>
                    <option value="Pending">Pending</option>
                </select>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <a href="{{ url_for('employee_detail', id=employee.id) }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn"><i class="fa-solid fa-save"></i> Save Payment</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
